        function searchPlaces() {
            const query = document.getElementById('search').value.toLowerCase();
            const results = document.getElementById('results');
            
            if (!query) {
                alert('키워드를 입력하세요');
                return;
            }
            
            const found = FUKUOKA_PLACES_DATA.places.filter(place => 
                place.name.toLowerCase().includes(query) ||
                place.category.toLowerCase().includes(query)
            );
            
            if (found.length === 0) {
                results.innerHTML = '<p>검색 결과가 없습니다.</p>';
            } else {
                results.innerHTML = `<p>${found.length}개 발견</p>` + found.map(p => `
                    <div class="result">
                        <h3>${p.name}</h3>
                        <span class="category">${p.category}</span>
                        ${p.description ? `<p>${p.description}</p>` : ''}
                        <a href="${p.googleMapsUrl}" target="_blank">📍 Google Maps에서 보기</a>
                    </div>
                `).join('');
            }
        }
        
        // 초기화
        document.getElementById('total').textContent = FUKUOKA_PLACES_DATA.metadata.total_places;
