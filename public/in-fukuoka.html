<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Fukuoka — Travel Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FED0BC;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Courier New', monospace;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-family: 'Courier New', 'Courier', monospace;
            font-size: clamp(32px, 6vw, 54px);
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #3533a3;
            margin-bottom: 15px;
        }

        header .subtitle {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 400;
            text-transform: uppercase;
            color: #000;
            opacity: 0.7;
            letter-spacing: 2px;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Section Title */
        .section-title {
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-size: clamp(26px, 5.5vw, 44px);
            font-weight: 700;
            text-transform: uppercase;
            color: #FFF;
            background: #000;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: inline-block;
            letter-spacing: 0.08em;
        }

        /* Info Card (Flights) */
        .info-card {
            background: rgba(255, 255, 255, 0.7);
            border: 3px solid #000;
            padding: 30px;
            margin-bottom: 60px;
        }

        .info-card p {
            font-size: 14px;
            line-height: 1.8;
            color: #000;
            margin-bottom: 10px;
        }

        .info-card p:last-child {
            margin-bottom: 0;
        }

        .info-card strong {
            font-weight: bold;
        }

        /* Weather Chart */
        .chart-wrapper {
            background: rgba(255, 255, 255, 0.7);
            border: 3px solid #000;
            padding: 30px;
            margin-bottom: 60px;
        }

        .chart-wrapper canvas {
            max-height: 300px;
        }

        /* Search Box */
        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: 3px solid #000;
            background: rgba(255, 255, 255, 0.7);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-transform: uppercase;
        }

        .search-box input:focus {
            outline: none;
            background: #FFF;
            box-shadow: 5px 5px 0 #000;
        }

        /* Filter Buttons */
        .filter-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .filter-btn, .category-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid #000;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active,
        .filter-btn:hover,
        .category-btn.active,
        .category-btn:hover {
            background: #000;
            color: #FFF;
        }

        /* Phrases List */
        #phrasesList {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .phrase-item {
            background: rgba(255, 255, 255, 0.7);
            border: 3px solid #000;
            padding: 20px;
        }

        .phrase-japanese {
            font-size: 18px;
            font-weight: bold;
            color: #000;
            margin-bottom: 8px;
        }

        .phrase-romaji {
            font-size: 13px;
            color: #000;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .phrase-korean {
            font-size: 14px;
            color: #000;
        }

        /* Places List */
        #placesList {
            margin-bottom: 60px;
        }

        .place-item {
            background: rgba(255, 255, 255, 0.7);
            border: 3px solid #000;
            padding: 25px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .place-number {
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.2);
            line-height: 1;
            min-width: 40px;
        }

        .place-content {
            flex: 1;
        }

        .place-name {
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            color: #000;
            margin-bottom: 8px;
        }

        .place-category {
            display: inline-block;
            padding: 4px 10px;
            background: #000;
            color: #FFF;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .place-link {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #000;
            color: #FFF;
            font-size: 12px;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .place-link:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: translateX(4px);
        }

        /* Places Toggle Button */
        .places-toggle-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 12px 25px;
            background: #000;
            color: #FFF;
            border: 2px solid #000;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .places-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.7);
            color: #000;
        }

        #placesList.hidden {
            display: none;
        }

        /* Back Link */
        .back-link {
            display: inline-block;
            margin-bottom: 40px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.7);
            color: #000;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid #000;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: #000;
            color: #FFF;
            transform: translateX(-4px);
        }

        /* Footer */
        footer {
            background: #000;
            color: #FFF;
            padding: 40px 20px;
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
        }

        footer p {
            margin-bottom: 10px;
        }

        footer a {
            color: #FFF;
            text-decoration: none;
            border-bottom: 1px solid #FFF;
        }

        footer a:hover {
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 32px;
            }

            header .subtitle {
                font-size: 11px;
                letter-spacing: 1px;
            }

            .chart-wrapper {
                padding: 20px 15px;
                margin-bottom: 40px;
            }

            .chart-wrapper canvas {
                max-height: 250px;
            }

            #phrasesList {
                grid-template-columns: 1fr;
            }

            .place-item {
                flex-direction: column;
            }

            .filter-buttons {
                gap: 10px;
            }

            .filter-btn, .category-btn {
                font-size: 10px;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>#in fukuoka</h1>
        <p class="subtitle">Local Guide & Travel Info</p>
    </header>

    <div class="container">

        <!-- Section 1: Flights -->
        <section>
            <h2 class="section-title">FLIGHTS</h2>
            <div class="info-card">
                <p><strong>ICN → FUK:</strong> 2026.04.27, 09:30</p>
                <p><strong>FUK → ICN:</strong> 2026.04.29, 18:45</p>

            </div>
        </section>

        <!-- Section 2: Weather Chart -->
        <section>
            <h2 class="section-title">WEATHER</h2>

                <canvas id="weatherChart"></canvas>

        </section>

                <button class="category-btn" data-category="Cafe & Bakery">CAFE</button>
                <button class="category-btn" data-category="Ramen">RAMEN</button>
                <button class="category-btn" data-category="Yakiniku">YAKINIKU</button>
                <button class="category-btn" data-category="Hamburg">HAMBURG</button>
                <button class="category-btn" data-category="Izakaya">IZAKAYA</button>
                <button class="category-btn" data-category="Store">STORE</button>
                <button class="category-btn" data-category="Attraction">ATTRACTION</button>
            </div>

            <!-- Places Count -->
            <div id="placesCount" style="margin-bottom: 20px; font-size: 14px; color: #000; opacity: 0.7;"></div>

            <!-- Toggle Button -->
            <button id="placesToggleBtn" class="places-toggle-btn">HIDE PLACES</button>

            <!-- Places List -->
            <div id="placesList"></div>
        </section>

        <!-- Section 4: Useful Phrases -->
        <section>
            <h2 class="section-title">USEFUL PHRASES</h2>

            <!-- Search Box -->
            <div class="search-box">
                <input type="text" id="phrasesSearch" placeholder="SEARCH PHRASES...">
            </div>

            <!-- Filter Buttons -->
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">ALL</button>
                <button class="filter-btn" data-filter="greeting">GREETING</button>
                <button class="filter-btn" data-filter="order">ORDER</button>
                <button class="filter-btn" data-filter="question">QUESTION</button>
                <button class="filter-btn" data-filter="payment">PAYMENT</button>
            </div>

            <!-- Phrases List -->
            <div id="phrasesList"></div>
        </section>

        <a href="index.html" class="back-link">← BACK TO MAIN</a>

    </div>

    <!-- Footer -->
    <footer>
        <p>Fukuoka Field Guide — Spring 2026</p>
        <p><a href="index.html">메인으로 돌아가기</a> | <a href="history.html">역사</a> | <a href="checklist.html">체크리스트</a> | <a href="emergency.html">긴급</a></p>
    </footer>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <script>
        // ============================================================
        // WEATHER CHART
        // ============================================================
        const FUKUOKA_LAT = 33.5904;
        const FUKUOKA_LON = 130.4017;

        let weatherChartInstance = null;

        async function loadWeatherChart() {
            const canvas = document.getElementById('weatherChart');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');

            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${FUKUOKA_LAT}&longitude=${FUKUOKA_LON}&hourly=temperature_2m,precipitation_probability&timezone=Asia/Tokyo&forecast_days=3`;

                const response = await fetch(url);
                const data = await response.json();

                if (!data.hourly) {
                    throw new Error('Invalid API response');
                }

                const { hourly } = data;

                // Labels: Time + Day
                const labels = hourly.time.slice(0, 72).map((time, i) => {
                    const date = new Date(time);
                    const hour = date.getHours();
                    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                    const dayName = dayNames[date.getDay()];

                    if (hour === 0) {
                        return `${dayName} ${hour}:00`;
                    }
                    return `${hour}:00`;
                });

                // Temperature data
                const temperatures = hourly.temperature_2m.slice(0, 72);

                // Precipitation probability
                const precipProb = hourly.precipitation_probability?.slice(0, 72) || Array(72).fill(0);

                // Destroy existing chart
                if (weatherChartInstance) {
                    weatherChartInstance.destroy();
                }

                // Create Chart.js chart with PUNK STYLE
                weatherChartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Temperature (°C)',
                                data: temperatures,
                                borderColor: '#000',
                                backgroundColor: 'rgba(0, 0, 0, 0.1)',
                                borderWidth: 3,
                                fill: true,
                                tension: 0.4,
                                pointRadius: 0,
                                pointHoverRadius: 5,
                                pointBackgroundColor: '#FFF',
                                pointBorderColor: '#000',
                                pointBorderWidth: 2,
                                yAxisID: 'y-temp'
                            },
                            {
                                label: 'Precipitation (%)',
                                data: precipProb,
                                borderColor: '#C44536',
                                backgroundColor: 'rgba(196, 69, 54, 0.1)',
                                borderWidth: 2,
                                fill: true,
                                tension: 0.4,
                                pointRadius: 0,
                                pointHoverRadius: 5,
                                pointBackgroundColor: '#C44536',
                                pointBorderColor: '#000',
                                pointBorderWidth: 2,
                                yAxisID: 'y-precip'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                labels: {
                                    color: '#000',
                                    font: {
                                        size: 12,
                                        family: "'Courier New', monospace"
                                    },
                                    usePointStyle: true,
                                    padding: 15
                                }
                            },
                            tooltip: {
                                mode: 'index',
                                intersect: false,
                                backgroundColor: 'rgba(0, 0, 0, 0.9)',
                                titleColor: '#FFF',
                                bodyColor: '#FFF',
                                borderColor: '#000',
                                borderWidth: 2,
                                displayColors: true,
                                callbacks: {
                                    label: function(context) {
                                        const label = context.dataset.label || '';
                                        const value = context.parsed.y;
                                        if (label.includes('Temperature')) {
                                            return `${label}: ${value}°C`;
                                        } else {
                                            return `${label}: ${value}%`;
                                        }
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: {
                                    color: 'rgba(0, 0, 0, 0.1)',
                                    drawBorder: false
                                },
                                ticks: {
                                    color: '#000',
                                    maxRotation: 45,
                                    minRotation: 45,
                                    autoSkip: true,
                                    maxTicksLimit: 24,
                                    font: {
                                        family: "'Courier New', monospace"
                                    }
                                }
                            },
                            'y-temp': {
                                type: 'linear',
                                position: 'left',
                                grid: {
                                    color: 'rgba(0, 0, 0, 0.1)',
                                    drawBorder: false
                                },
                                ticks: {
                                    color: '#000',
                                    callback: function(value) {
                                        return value + '°C';
                                    },
                                    font: {
                                        family: "'Courier New', monospace"
                                    }
                                }
                            },
                            'y-precip': {
                                type: 'linear',
                                position: 'right',
                                min: 0,
                                max: 100,
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    color: '#C44536',
                                    callback: function(value) {
                                        return value + '%';
                                    },
                                    font: {
                                        family: "'Courier New', monospace"
                                    }
                                }
                            }
                        },
                        interaction: {
                            mode: 'nearest',
                            axis: 'x',
                            intersect: false
                        }
                    }
                });

            } catch (error) {
                console.error('Weather Chart API error:', error);
                canvas.parentElement.innerHTML = '<div style="color: #000; text-align: center; padding: 3rem;">날씨 차트를 불러올 수 없습니다.</div>';
            }
        }

        // ============================================================
        // PHRASES DATA
        // ============================================================
        const phrasesData = [
            { japanese: 'こんにちは', romaji: 'Konnichiwa', korean: '안녕하세요', category: 'greeting' },
            { japanese: 'ありがとうございます', romaji: 'Arigatou gozaimasu', korean: '감사합니다', category: 'greeting' },
            { japanese: 'すみません', romaji: 'Sumimasen', korean: '죄송합니다 / 저기요', category: 'greeting' },
            { japanese: 'これをください', romaji: 'Kore wo kudasai', korean: '이것을 주세요', category: 'order' },
            { japanese: 'おすすめは何ですか', romaji: 'Osusume wa nan desu ka', korean: '추천 메뉴는 무엇인가요', category: 'order' },
            { japanese: 'いくらですか', romaji: 'Ikura desu ka', korean: '얼마입니까', category: 'payment' },
            { japanese: 'お会計お願いします', romaji: 'Okaikei onegai shimasu', korean: '계산 부탁합니다', category: 'payment' },
            { japanese: 'トイレはどこですか', romaji: 'Toire wa doko desu ka', korean: '화장실은 어디입니까', category: 'question' },
            { japanese: '英語できますか', romaji: 'Eigo dekimasu ka', korean: '영어 가능하신가요', category: 'question' },
            { japanese: 'ごちそうさまでした', romaji: 'Gochisousama deshita', korean: '잘 먹었습니다', category: 'greeting' }
        ];

        // Load phrases with filter and search
        function loadPhrases(filter = 'all', search = '') {
            const container = document.getElementById('phrasesList');
            const filtered = phrasesData.filter(p => {
                const matchesFilter = filter === 'all' || p.category === filter;
                const matchesSearch = search === '' ||
                    p.japanese.includes(search) ||
                    p.romaji.toLowerCase().includes(search.toLowerCase()) ||
                    p.korean.includes(search);
                return matchesFilter && matchesSearch;
            });

            container.innerHTML = filtered.map(p => `
                <div class="phrase-item">
                    <div class="phrase-japanese">${p.japanese}</div>
                    <div class="phrase-romaji">${p.romaji}</div>
                    <div class="phrase-korean">${p.korean}</div>
                </div>
            `).join('');
        }

        // Filter buttons for phrases
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadPhrases(btn.dataset.filter, document.getElementById('phrasesSearch').value);
            });
        });

        // Search for phrases
        document.getElementById('phrasesSearch').addEventListener('input', (e) => {
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
            loadPhrases(activeFilter, e.target.value);
        });

        // ============================================================
        // FUKUOKA PLACES DATA (57 places)
        // ============================================================
        const FUKUOKA_PLACES_DATA = {
          "places": [
            {"name": "타카미 스시", "lat": 33.5846346, "lng": 130.3951329, "category": "Sushi & Meal", "description": "", "googleMapsUrl": "https://www.google.com/maps/search/?api=1&query=%ED%83%80%EC%B9%B4%EB%AF%B8%20%EC%8A%A4%EC%8B%9C+fukuoka"},
            {"name": "스시사카바 사시스 하카타마잉구점", "lat": 33.5906798, "lng": 130.4206962, "category": "Sushi & Meal", "description": "", "googleMapsUrl": "https://www.google.com/maps/search/?api=1&query=%EC%8A%A4%EC%8B%9C%EC%82%AC%EC%B9%B4%EB%B0%94%20%EC%82%AC%EC%8B%9C%EC%8A%A4%20%ED%95%98%EC%B9%B4%ED%83%80%EB%A7%88%EC%9E%89%EA%B5%AC%EC%A0%90+fukuoka"},
            {"name": "旨鮨stand O", "lat": 33.5913748, "lng": 130.3928677, "category": "Sushi & Meal", "description": "", "googleMapsUrl": "https://www.google.com/maps/search/?api=1&query=%E6%97%A8%E9%AE%A8stand%20O+fukuoka"},
            {"name": "우오츄", "lat": 33.5854051, "lng": 130.3977491, "category": "Sushi & Meal", "description": "", "googleMapsUrl": "https://www.google.com/maps/search/?api=1&query=%EC%9A%B0%EC%98%A4%EC%B8%84+fukuoka"},
            {"name": "쇼쿠도 미츠", "lat": 33.5830234, "lng": 130.4083219, "category": "Sushi & Meal", "description": "굉장히 가고 싶음", "googleMapsUrl": "https://www.google.com/maps/search/?api=1&query=%EC%87%BC%EC%BF%A0%EB%8F%84%20%EB%AF%B8%EC%B8%A0+fukuoka"},
            {"name": "殊代 cotoshiro（ことしろ）", "lat": 33.5880955, "lng": 130.3923513, "category": "Sushi & Meal", "description": "", "googleMapsUrl": "https://www.google.com/maps/search/?api=1&query=%E6%AE%8A%E4%BB%A3%20cotoshiro%EF%BC%88%E3%81%93%E3%81%A8%E3%81%97%E3%82%8D%EF%BC%89+fukuoka"},
            {"name": "텐텐테이", "lat": 33.594518, "lng": 130.400779, "category": "Sushi & Meal", "description": "", "googleMapsUrl": "https://www.google.com/maps/search/?api=1&query=%ED%85%90%ED%85%90%ED%85%8C%EC%9D%B4+fukuoka"},
            {"name": "부타 매니아동 이나다야 선", "lat": 33.5829599, "lng": 130.407105, "category": "Sushi & Meal", "description": "", "googleMapsUrl": "https://www.google.com/maps/search/?api=1&query=%EB%B6%80%ED%83%80%20%EB%A7%A4%EB%8B%88%EC%95%84%EB%8F%99%20%EC%9D%B4%EB%82%98%EB%8B%A4%EC%95%BC%20%EC%84%A0+fukuoka"},

        // Load places with category filter AND search
        function loadPlaces(category = 'all', searchTerm = '') {
            const container = document.getElementById('placesList');
            const countEl = document.getElementById('placesCount');

            // 1. 카테고리 필터링
            let filtered = category === 'all'
                ? FUKUOKA_PLACES_DATA.places
                : FUKUOKA_PLACES_DATA.places.filter(p => p.category === category);

            // 2. 검색어 필터링 (이름 또는 카테고리에서 검색)
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(term) ||
                    p.category.toLowerCase().includes(term)
                );
            }

            // 3. 결과 카운트 표시
            if (searchTerm || category !== 'all') {
                countEl.textContent = `${filtered.length}개 장소 표시 (전체 ${FUKUOKA_PLACES_DATA.places.length}개)`;
            } else {
                countEl.textContent = `전체 ${FUKUOKA_PLACES_DATA.places.length}개 장소`;
            }

            // 4. 결과가 없으면 메시지 표시
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:#000;">검색 결과가 없습니다.</div>';
                return;
            }

            // 5. 장소 카드 렌더링
            container.innerHTML = filtered.map((place, i) => `
                <div class="place-item">
                    <div class="place-number">${String(i + 1).padStart(2, '0')}</div>
                    <div class="place-content">
                        <div class="place-name">${place.name}</div>
                        <div class="place-category">${place.category}</div>
                        <a href="${place.googleMapsUrl}" class="place-link" target="_blank">Google Maps →</a>
                    </div>
                </div>
            `).join('');
        }

        // 검색창 input 이벤트
        document.getElementById('placesSearch').addEventListener('input', (e) => {
            const activeCategory = document.querySelector('.category-btn.active').dataset.category;
            loadPlaces(activeCategory, e.target.value);
        });

        // 카테고리 버튼 클릭 (검색어 유지)
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const searchTerm = document.getElementById('placesSearch').value;
                loadPlaces(btn.dataset.category, searchTerm);
            });
        });

        // ============================================================
        // INITIALIZE ON PAGE LOAD
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            loadWeatherChart();
            loadPhrases();
            loadPlaces();

            // Toggle button for places list
            const placesToggleBtn = document.getElementById('placesToggleBtn');
            const placesList = document.getElementById('placesList');

            if (placesToggleBtn && placesList) {
                placesToggleBtn.addEventListener('click', () => {
                    placesList.classList.toggle('hidden');
                    placesToggleBtn.textContent = placesList.classList.contains('hidden')
                        ? 'SHOW PLACES'
                        : 'HIDE PLACES';
                });
            }
        });
    </script>
