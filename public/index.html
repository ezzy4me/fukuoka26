<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUKUOKA FIELD GUIDE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FED0BC;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Central Graphic */
        .central-graphic {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            height: 55vh;
            mix-blend-mode: multiply;
            z-index: 1;
        }

        /* Navigation Menu - Top Left */
        .nav-menu {
            position: absolute;
            left: 5%;
            top: 14%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-menu a {
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
            font-size: clamp(18px, 2.2vw, 24px);
            text-transform: uppercase;
            color: #000;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-menu a:hover {
            color: #3533a3;
        }

        /* Hashtag - Center Top */
        .hashtag {
            position: absolute;
            left: 50%;
            top: 6%;
            transform: translateX(-50%);
            font-family: 'Courier New', 'Courier', monospace;
            font-weight: 400;
            font-size: 56px;
            letter-spacing: 0.15em;
            color: #3533a3;
            z-index: 10;
        }

        /* Dates - Bottom Left */
        .dates {
            position: absolute;
            left: 5%;
            bottom: 8%;
            z-index: 10;
            font-family: Impact, 'Arial Black', sans-serif;
            font-weight: 900;
            font-size: clamp(54px, 7vw, 64px);
            line-height: 1.1;
            color: #3533a3;
        }

        /* Japanese Text - Center Bottom */
        .japanese-text {
            position: absolute;
            left: 50%;
            bottom: 4%;
            transform: translateX(-50%);
            font-family: "游明朝", "Yu Mincho", "Hiragino Mincho ProN", Georgia, serif;
            font-size: clamp(18px, 2.5vw, 24px);
            font-weight: 400;
            color: #000;
            z-index: 10;
        }

        /* Place Info - Bottom Right */
        .place-info {
            position: absolute;
            right: 5%;
            bottom: 12%;
            z-index: 10;
            text-align: right;
        }

        .place-label {
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            color: #000;
            margin-bottom: 8px;
        }

        .place-box {
            display: inline-block;
            background: #000;
            color: #FFF;
            padding: 12px 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .place-box:hover {
            background: #FFF;
            color: #000;
            transform: translateY(-2px);
        }

        .place-box div:first-child {
            font-size: 14px;
            margin-bottom: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .central-graphic {
                height: 45vh;
            }

            .nav-menu {
                left: 3%;
                top: 12%;
                gap: 6px;
            }

            .nav-menu a {
                font-size: 18px;
            }

            .hashtag {
                font-size: 42px;
                top: 5%;
            }

            .dates {
                font-size: 50px;
                left: 3%;
                bottom: 6%;
            }

            .japanese-text {
                font-size: 16px;
                bottom: 3%;
            }

            .place-info {
                right: 3%;
                bottom: 10%;
            }

            .place-label {
                font-size: 14px;
            }

            .place-box {
                padding: 10px 12px;
                font-size: 11px;
            }

            .place-box div:first-child {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Central Graphic -->
    <img src="images/Gemini_Generated_Image_he9g47he9g47he9g.png" class="central-graphic" alt="Fukuoka Skyline">

    <!-- Navigation Menu - Top Left -->
    <nav class="nav-menu">
        <a href="history.html">HISTORY</a>
        <a href="in-fukuoka.html">IN FUKUOKA</a>
        <a href="checklist.html">CHECKLIST</a>
        <a href="emergency.html">EMERGENCY</a>
    </nav>

    <!-- Hashtag - Center Top -->
    <div class="hashtag">#fukuoka</div>

    <!-- Dates - Bottom Left -->
    <div class="dates">
        <div>2026.</div>
        <div>4.27-</div>
        <div>4.29</div>
    </div>

    <!-- Japanese Text - Center Bottom -->
    <div class="japanese-text">「ばり好きっちゃん!」</div>

    <!-- Place Info - Bottom Right -->
    <div class="place-info">
        <div class="place-label">WE SLEEP HERE:</div>
        <a href="https://maps.app.goo.gl/S7wDTJdf3aVYRqUr5" class="place-box" target="_blank" rel="noopener noreferrer">
            <div>リッチモンドホテル 天神西通</div>
            <div>Richmond Hotels</div>
            <div>Tenjin Nishidori</div>
        </a>
    </div>

</body>
</html>
